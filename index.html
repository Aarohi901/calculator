<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <h1>CALCULATOR</h1>
    <div class="calculator">
       <div class="display-box">
        <input type="text">
       </div>
        <div class="buttons-row0">
        <button class="btn per">%</button>
        <button class="btn ce">CE</button>
        <button class="btn c">C</button>
        <button class="btn add">+</button>
       </div>
       <div class="buttons-row1">
        <button class="btn d">7</button>
        <button class="btn d">8</button>
        <button class="btn d">9</button>
        <button class="btn div">/</button>
       </div>
       <div class="buttons-row2">
        <button class="btn d">4</button>
        <button class="btn d">5</button>
        <button class="btn d">6</button>
        <button class="btn mul">*</button>
       </div>
       <div class="buttons-row3">
        <button class="btn d">1</button>
        <button class="btn d">2</button>
        <button class="btn d">3</button>
        <button class="btn sub">-</button>
       </div>
        <div class="buttons-row4">
         <button class="btn erase"><i class="fa-solid fa-delete-left"></i></button>
        <button class="btn d">0</button>
        <button class="btn d">.</button>
        <button class="btn equal">=</button>
       </div>
    </div>


    <script src="calculator.js"></script>
</body>
</html>
